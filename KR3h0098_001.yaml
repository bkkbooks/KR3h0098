body:
  text: 儒棋格一卷投二智一禮二位三義四信五棋下白黑半方五分長寸善六敬七德八忠九順十方局尺五周道四十其用三十六四維之道通數而棊謙退為尚故高彩者先投彼此二位謂之淨左右二道謂之中其淨中四道彼此左右牙有二不得相干行棊之法始附淨起轉為伏伏者不梟若彩雖會而于彼擬過之非于彼者則自居矣行伏棋者得以彩依數而行兩彩同者唯行一一謙者停兩謙退一等行梟碁者得異彩亦候數而行兩彩同者盡行其數一謙一行道兩謙者停行伏不得衍梟不得行伏折梟伏者皆從后定因彩而悶者屋而申之緣行致纍者閲而通足皆不限道數梟伏而閲者但行于梟行碁之體不相淩觸所蹈皆靈孤明自出絶於跪巧而順消息悉遇中道勝負乃分先梟后伏驗之于淨道梟若從不盡二彩者則全行伏梟伏兩少者行于梟彼既出盡此有不出者即許以為勝者之算若全未出則為之露投次局負仍先得十算立一爵十爵立則成勝矣
